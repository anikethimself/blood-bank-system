{% extends 'blood_bank/base.html' %}

{% block title %}Request Blood{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center text-danger mb-4">Request Blood</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Required Blood Group</label>
                    <select name="blood_group" class="form-select">
                        {% for bg in blood_groups %}
                            <option value="{{ bg }}">{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Units Needed</label>
                    <input type="number" name="units" class="form-control" min="1" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Reason / Hospital Name</label>
                    <textarea name="reason" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Request</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
